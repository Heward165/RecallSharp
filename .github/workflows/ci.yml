name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, verify, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RecallSharp.slnx

      - name: Verify formatting
        run: dotnet format RecallSharp.slnx --no-restore --verify-no-changes

      - name: Build
        run: dotnet build RecallSharp.slnx -c Release --no-restore

      - name: Run conformance checks
        run: dotnet run --project tests/RecallSharp.Conformance -c Release --no-build

      - name: Run unit and randomized tests
        run: dotnet test tests/RecallSharp.Tests -c Release --no-build

      - name: Run example
        run: dotnet run --project examples/RecallSharp.Example -c Release --no-build

      - name: Benchmark smoke test
        run: dotnet run --project benchmarks/RecallSharp.Benchmarks -c Release --no-build

      - name: Pack libraries
        run: |
          dotnet pack src/RecallSharp/RecallSharp.csproj -c Release --no-build -o artifacts/packages
          dotnet pack src/RecallSharp.Optimizer/RecallSharp.Optimizer.csproj -c Release --no-build -o artifacts/packages

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: RecallSharp-package
          path: artifacts/packages/*.*nupkg
          if-no-files-found: error
